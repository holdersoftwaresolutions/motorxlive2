services:
  - type: web
    name: motorxlive-api
    runtime: docker
    plan: starter
    region: oregon
    rootDir: api
    healthCheckPath: /healthz
    autoDeployTrigger: commit

    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_MIGRATIONS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: motorxlive-db
          property: connectionString
      - key: MOTORXLIVE_MASTER_KEY
        sync: false
      - key: MUX_TOKEN_ID
        sync: false
      - key: MUX_TOKEN_SECRET
        sync: false
      - key: MUX_WEBHOOK_SECRET
        sync: false

databases:
  - name: motorxlive-db
    databaseName: motorxlive
    user: motorxlive
    plan: basic-256mb
    region: oregon
